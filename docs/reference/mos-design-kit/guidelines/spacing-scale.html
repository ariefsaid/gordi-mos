<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px base unit. spacing(n) = n × 4px. Dense, grid-aligned layouts." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--ds-font-family); background: var(--ds-background-primary); padding: 24px; color: var(--ds-font-color-secondary); }
  .row { display: flex; align-items: center; gap: 14px; padding: 4px 0; }
  .tok { width: 70px; font-size: 11px; color: var(--ds-font-color-tertiary); font-family: var(--ds-code-font-family); }
  .bar { height: 14px; background: var(--ds-color-blue5); border-radius: 2px; }
  .px { font-size: 11px; color: var(--ds-font-color-tertiary); }
</style>
</head>
<body>
  <div class="row"><div class="tok">1</div><div class="bar" style="width:var(--ds-spacing-1)"></div><div class="px">4px</div></div>
  <div class="row"><div class="tok">2</div><div class="bar" style="width:var(--ds-spacing-2)"></div><div class="px">8px</div></div>
  <div class="row"><div class="tok">3</div><div class="bar" style="width:var(--ds-spacing-3)"></div><div class="px">12px</div></div>
  <div class="row"><div class="tok">4</div><div class="bar" style="width:var(--ds-spacing-4)"></div><div class="px">16px</div></div>
  <div class="row"><div class="tok">6</div><div class="bar" style="width:var(--ds-spacing-6)"></div><div class="px">24px</div></div>
  <div class="row"><div class="tok">8</div><div class="bar" style="width:var(--ds-spacing-8)"></div><div class="px">32px</div></div>
</body>
</html>
