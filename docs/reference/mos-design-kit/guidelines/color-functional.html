<!-- @dsCard group="Colors" viewport="700x160" name="Functional colors" subtitle="The primary hue (step 9) of each semantic family used for status & accents." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--ds-font-family); background: var(--ds-background-primary); padding: 20px; color: var(--ds-font-color-secondary); }
  .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
  .sw { display: flex; flex-direction: column; gap: 6px; align-items: center; }
  .chip { width: 100%; height: 52px; border-radius: var(--ds-border-radius-md); border: 1px solid var(--ds-border-color-transparent-strong); }
  .n { font-size: 11px; color: var(--ds-font-color-secondary); }
</style>
</head>
<body>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:var(--ds-color-blue)"></div><div class="n">blue</div></div>
    <div class="sw"><div class="chip" style="background:var(--ds-color-green)"></div><div class="n">green</div></div>
    <div class="sw"><div class="chip" style="background:var(--ds-color-red)"></div><div class="n">red</div></div>
    <div class="sw"><div class="chip" style="background:var(--ds-color-orange)"></div><div class="n">orange</div></div>
    <div class="sw"><div class="chip" style="background:var(--ds-color-yellow)"></div><div class="n">yellow</div></div>
    <div class="sw"><div class="chip" style="background:var(--ds-color-purple)"></div><div class="n">purple</div></div>
    <div class="sw"><div class="chip" style="background:var(--ds-color-pink)"></div><div class="n">pink</div></div>
    <div class="sw"><div class="chip" style="background:var(--ds-color-turquoise)"></div><div class="n">turquoise</div></div>
    <div class="sw"><div class="chip" style="background:var(--ds-color-sky)"></div><div class="n">sky</div></div>
    <div class="sw"><div class="chip" style="background:var(--ds-color-jade)"></div><div class="n">jade</div></div>
    <div class="sw"><div class="chip" style="background:var(--ds-color-violet)"></div><div class="n">violet</div></div>
    <div class="sw"><div class="chip" style="background:var(--ds-color-crimson)"></div><div class="n">crimson</div></div>
    <div class="sw"><div class="chip" style="background:var(--ds-color-amber)"></div><div class="n">amber</div></div>
    <div class="sw"><div class="chip" style="background:var(--ds-color-gray)"></div><div class="n">gray</div></div>
  </div>
</body>
</html>
