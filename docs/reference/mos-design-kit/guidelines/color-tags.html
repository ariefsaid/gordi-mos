<!-- @dsCard group="Colors" viewport="700x190" name="Tag palette" subtitle="Signature record-coloring system: tinted background (step 3) + text (step 11)." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--ds-font-family); background: var(--ds-background-primary); padding: 20px; }
  .wrap { display: flex; flex-wrap: wrap; gap: 8px; }
  .tag {
    display: inline-flex; align-items: center; height: 20px; padding: 0 8px;
    border-radius: var(--ds-border-radius-pill);
    font-size: var(--ds-font-size-xs); font-weight: 500; white-space: nowrap;
  }
</style>
</head>
<body>
  <div class="wrap">
    <span class="tag" style="background:var(--ds-tag-background-gray);color:var(--ds-tag-text-gray)">Gray</span>
    <span class="tag" style="background:var(--ds-tag-background-blue);color:var(--ds-tag-text-blue)">Blue</span>
    <span class="tag" style="background:var(--ds-tag-background-sky);color:var(--ds-tag-text-sky)">Sky</span>
    <span class="tag" style="background:var(--ds-tag-background-turquoise);color:var(--ds-tag-text-turquoise)">Turquoise</span>
    <span class="tag" style="background:var(--ds-tag-background-cyan);color:var(--ds-tag-text-cyan)">Cyan</span>
    <span class="tag" style="background:var(--ds-tag-background-green);color:var(--ds-tag-text-green)">Green</span>
    <span class="tag" style="background:var(--ds-tag-background-jade);color:var(--ds-tag-text-jade)">Jade</span>
    <span class="tag" style="background:var(--ds-tag-background-grass);color:var(--ds-tag-text-grass)">Grass</span>
    <span class="tag" style="background:var(--ds-tag-background-lime);color:var(--ds-tag-text-lime)">Lime</span>
    <span class="tag" style="background:var(--ds-tag-background-yellow);color:var(--ds-tag-text-yellow)">Yellow</span>
    <span class="tag" style="background:var(--ds-tag-background-amber);color:var(--ds-tag-text-amber)">Amber</span>
    <span class="tag" style="background:var(--ds-tag-background-orange);color:var(--ds-tag-text-orange)">Orange</span>
    <span class="tag" style="background:var(--ds-tag-background-red);color:var(--ds-tag-text-red)">Red</span>
    <span class="tag" style="background:var(--ds-tag-background-tomato);color:var(--ds-tag-text-tomato)">Tomato</span>
    <span class="tag" style="background:var(--ds-tag-background-ruby);color:var(--ds-tag-text-ruby)">Ruby</span>
    <span class="tag" style="background:var(--ds-tag-background-crimson);color:var(--ds-tag-text-crimson)">Crimson</span>
    <span class="tag" style="background:var(--ds-tag-background-pink);color:var(--ds-tag-text-pink)">Pink</span>
    <span class="tag" style="background:var(--ds-tag-background-plum);color:var(--ds-tag-text-plum)">Plum</span>
    <span class="tag" style="background:var(--ds-tag-background-purple);color:var(--ds-tag-text-purple)">Purple</span>
    <span class="tag" style="background:var(--ds-tag-background-violet);color:var(--ds-tag-text-violet)">Violet</span>
    <span class="tag" style="background:var(--ds-tag-background-iris);color:var(--ds-tag-text-iris)">Iris</span>
    <span class="tag" style="background:var(--ds-tag-background-bronze);color:var(--ds-tag-text-bronze)">Bronze</span>
    <span class="tag" style="background:var(--ds-tag-background-gold);color:var(--ds-tag-text-gold)">Gold</span>
    <span class="tag" style="background:var(--ds-tag-background-brown);color:var(--ds-tag-text-brown)">Brown</span>
    <span class="tag" style="background:var(--ds-tag-background-mauve);color:var(--ds-tag-text-mauve)">Mauve</span>
    <span class="tag" style="background:var(--ds-tag-background-slate);color:var(--ds-tag-text-slate)">Slate</span>
    <span class="tag" style="background:var(--ds-tag-background-sage);color:var(--ds-tag-text-sage)">Sage</span>
  </div>
</body>
</html>
