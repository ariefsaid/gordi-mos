<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals — Gray scale" subtitle="Pure neutral grays. Surfaces, borders and text all derive from this ramp." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--ds-font-family); background: var(--ds-background-primary); padding: 20px; color: var(--ds-font-color-secondary); }
  .row { display: flex; gap: 6px; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .chip { height: 56px; border-radius: var(--ds-border-radius-sm); border: 1px solid var(--ds-border-color-transparent-strong); }
  .n { font-size: 11px; color: var(--ds-font-color-tertiary); text-align: center; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--ds-color-gray1)"></div><div class="n">1</div></div>
    <div class="sw"><div class="chip" style="background:var(--ds-color-gray2)"></div><div class="n">2</div></div>
    <div class="sw"><div class="chip" style="background:var(--ds-color-gray3)"></div><div class="n">3</div></div>
    <div class="sw"><div class="chip" style="background:var(--ds-color-gray4)"></div><div class="n">4</div></div>
    <div class="sw"><div class="chip" style="background:var(--ds-color-gray5)"></div><div class="n">5</div></div>
    <div class="sw"><div class="chip" style="background:var(--ds-color-gray6)"></div><div class="n">6</div></div>
    <div class="sw"><div class="chip" style="background:var(--ds-color-gray7)"></div><div class="n">7</div></div>
    <div class="sw"><div class="chip" style="background:var(--ds-color-gray8)"></div><div class="n">8</div></div>
    <div class="sw"><div class="chip" style="background:var(--ds-color-gray9)"></div><div class="n">9</div></div>
    <div class="sw"><div class="chip" style="background:var(--ds-color-gray10)"></div><div class="n">10</div></div>
    <div class="sw"><div class="chip" style="background:var(--ds-color-gray11)"></div><div class="n">11</div></div>
    <div class="sw"><div class="chip" style="background:var(--ds-color-gray12)"></div><div class="n">12</div></div>
  </div>
</body>
</html>
