name: Deploy MOS → Cloudflare Pages (staging)

# Builds in CI and deploys to Cloudflare Pages ONLY on push to `staging`.
# There is intentionally NO pull_request / other-branch trigger, so Cloudflare never
# creates preview deployments — preserving the free-tier build quota (owner directive).
#
# IMPORTANT: connect the CF Pages project as **Direct Upload** (do NOT git-connect the
# repo to CF). This workflow's `wrangler pages deploy` is then the SOLE build+deploy path,
# so Cloudflare itself runs zero builds and spins up zero previews.
#
# Required GitHub repo settings (owner sets these — Settings → Secrets and variables → Actions):
#   Secrets:   CLOUDFLARE_API_TOKEN   (scoped: Account › Cloudflare Pages › Edit)
#              CLOUDFLARE_ACCOUNT_ID
#              VITE_SUPABASE_ANON_KEY (the PUBLIC anon key — stored as a secret by convention;
#                                      it is baked into the client bundle, RLS is the boundary)
#   Variables: VITE_SUPABASE_URL      (https://<project-ref>.supabase.co)
#              CF_PAGES_PROJECT       (the Cloudflare Pages project name)

on:
  push:
    branches: [staging]

concurrency:
  group: cf-pages-staging
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mos-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mos-app/package-lock.json

      - run: npm ci

      - name: Build SPA (base /mos/)
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy to Cloudflare Pages (Direct Upload, staging branch)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: mos-app
          command: pages deploy dist --project-name=${{ vars.CF_PAGES_PROJECT }} --branch=staging
