name: verify

on:
  push:
    branches: [main]
  pull_request:

defaults:
  run:
    working-directory: mos-app

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mos-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint:ci

      - name: Unit tests + coverage gate (≥80% changed lines)
        run: npm run test:coverage

      - name: Build
        run: npm run build
