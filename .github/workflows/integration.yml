name: integration

on:
  push:
    branches: [main]
  pull_request:

jobs:
  db:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.104.0

      - name: Start local Supabase stack (applies migrations + seed)
        # Full `supabase start` (not `db start`): e2e needs auth/API/mailpit, and
        # `supabase status -o env` only emits keys when the full stack is up.
        # `-x edge-runtime`: MOS ships no edge functions, and the edge-runtime
        # container intermittently 502s on its health check (flaked PR #9 CI +
        # locally) — excluding it removes a flaky dependency we never use.
        run: supabase start -x edge-runtime

      - name: Lint — every SECURITY DEFINER migration must revoke PUBLIC execute
        # Defense-in-depth: prevents a recurrence of the _test_seed_role_tree audit Critical
        # (2026-06-11) where a SECURITY DEFINER function was reachable via PostgREST because
        # it lacked an explicit REVOKE. Each file with 'security definer' must contain a
        # matching 'revoke execute on function' in the same file.
        run: |
          failed=0
          for f in supabase/migrations/*.sql; do
            if grep -qi 'security definer' "$f"; then
              if ! grep -qi 'revoke execute on function' "$f"; then
                echo "LINT FAIL: $f has SECURITY DEFINER but no 'revoke execute on function'" >&2
                failed=1
              fi
            fi
          done
          if [ "$failed" -eq 1 ]; then
            echo "Fix: add 'revoke execute on function <fn>() from public, anon, authenticated;' after each SECURITY DEFINER function definition." >&2
            exit 1
          fi
          echo "Lint OK: all SECURITY DEFINER migrations have revoke."

      - name: pgTAP suite
        run: supabase test db

      # ── E2E against the live stack ────────────────────────────────────────────
      # e2e lives here (not verify.yml) because journeys need auth + DB (T-027).
      # Inject local anon/service_role keys from `supabase status -o env` so they
      # are never hard-coded; the local keys are well-known dev constants anyway.

      - name: Export Supabase env to GITHUB_ENV
        # No `|| true`: if the keys are missing we want THIS step to fail, not e2e.
        run: |
          # status emits KEY="value" — strip the quotes or GITHUB_ENV keeps them literally
          supabase status -o env | grep -E '^(ANON_KEY|SERVICE_ROLE_KEY|API_URL)=' | tr -d '"' >> "$GITHUB_ENV"
          grep -q '^SERVICE_ROLE_KEY=eyJ' "$GITHUB_ENV"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mos-app/package-lock.json

      - name: Install app dependencies
        working-directory: mos-app
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('mos-app/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: mos-app
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: mos-app
        run: npx playwright install-deps chromium

      - name: E2E tests (live stack)
        working-directory: mos-app
        env:
          VITE_SUPABASE_URL: http://127.0.0.1:44321
          VITE_SUPABASE_ANON_KEY: ${{ env.ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SERVICE_ROLE_KEY }}
        run: npx playwright test

      - name: Stop stack
        if: always()
        run: supabase stop
