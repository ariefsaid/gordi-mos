name: integration

on:
  push:
    branches: [main]
  # On PRs the heavy full-stack job (boots Supabase + pgTAP + e2e, ~3–4 min) runs ONLY
  # when something it actually validates changes — DB/migrations/RLS, the e2e journeys,
  # or this workflow's deps. UI-only PRs run just `verify` (~1 min). Pushes to main always
  # run it (no paths filter on push), so every merge is fully validated post-merge.
  pull_request:
    paths:
      - 'supabase/**'
      - 'mos-app/e2e/**'
      - 'mos-app/playwright.config.*'
      - 'mos-app/package-lock.json'
      # NB: edits to THIS workflow are validated by the always-run push-to-main trigger
      # (kept out of the PR paths filter so a workflow-only PR doesn't boot the full stack).

jobs:
  db:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.104.0

      - name: Start local Supabase stack (applies migrations + seed)
        # Full `supabase start` (not `db start`): e2e needs auth/API/mailpit, and
        # `supabase status -o env` only emits keys when the full stack is up.
        # KEPT (load-bearing): db (pgTAP) · auth/rest/kong (app API) · inbucket (e2e
        # magic-link/reset). EXCLUDED: containers MOS's first slice never uses — speeds
        # the boot (~the dominant CI cost). edge-runtime/functions (no edge fns; the
        # edge-runtime container also intermittently 502s — flaked PR #9); studio/meta
        # (admin UI); imgproxy/storage (no file features); realtime (no subscriptions);
        # vector/analytics (log shipping). Re-add a name here if the app starts using it.
        run: supabase start -x edge-runtime,functions,studio,meta,imgproxy,storage,realtime,vector,analytics

      - name: Lint — every SECURITY DEFINER migration must revoke PUBLIC execute
        # Defense-in-depth: prevents a recurrence of the _test_seed_role_tree audit Critical
        # (2026-06-11) where a SECURITY DEFINER function was reachable via PostgREST because
        # it lacked an explicit REVOKE. Each file that DEFINES a 'security definer' function
        # must contain a matching 'revoke execute on function' in the same file.
        # SQL line comments are stripped first so a mere *mention* of "security definer" in a
        # comment (e.g. "writes are RPC-only via the SECURITY DEFINER approval RPC") is not a
        # false positive — only an actual definer clause in executable SQL is flagged.
        run: |
          failed=0
          for f in supabase/migrations/*.sql; do
            body=$(sed 's/--.*//' "$f")
            if echo "$body" | grep -qi 'security definer'; then
              if ! echo "$body" | grep -qi 'revoke execute on function'; then
                echo "LINT FAIL: $f has SECURITY DEFINER but no 'revoke execute on function'" >&2
                failed=1
              fi
            fi
          done
          if [ "$failed" -eq 1 ]; then
            echo "Fix: add 'revoke execute on function <fn>() from public, anon, authenticated;' after each SECURITY DEFINER function definition." >&2
            exit 1
          fi
          echo "Lint OK: all SECURITY DEFINER migrations have revoke."

      - name: pgTAP suite
        run: supabase test db

      # ── E2E against the live stack ────────────────────────────────────────────
      # e2e lives here (not verify.yml) because journeys need auth + DB (T-027).
      # Inject local anon/service_role keys from `supabase status -o env` so they
      # are never hard-coded; the local keys are well-known dev constants anyway.

      - name: Export Supabase env to GITHUB_ENV
        # No `|| true`: if the keys are missing we want THIS step to fail, not e2e.
        run: |
          # status emits KEY="value" — strip the quotes or GITHUB_ENV keeps them literally
          supabase status -o env | grep -E '^(ANON_KEY|SERVICE_ROLE_KEY|API_URL)=' | tr -d '"' >> "$GITHUB_ENV"
          grep -q '^SERVICE_ROLE_KEY=eyJ' "$GITHUB_ENV"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mos-app/package-lock.json

      - name: Install app dependencies
        working-directory: mos-app
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('mos-app/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: mos-app
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: mos-app
        run: npx playwright install-deps chromium

      - name: E2E tests (live stack)
        working-directory: mos-app
        env:
          VITE_SUPABASE_URL: http://127.0.0.1:44321
          VITE_SUPABASE_ANON_KEY: ${{ env.ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SERVICE_ROLE_KEY }}
        run: npx playwright test

      - name: Stop stack
        if: always()
        run: supabase stop
